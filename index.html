<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;background:#000;overflow:hidden}
</style>
<script>
const params = new URLSearchParams(window.location.search);
const exe = params.get('exe');
const FALLBACK_URL = 'https://discord.com/oauth2/authorize?client_id=1415079750178963618';
const JSON_URL = 'https://raw.githubusercontent.com/7yd7/BotScripts/refs/heads/test/lootlabsExe.json';
if (!exe) {
  window.location.replace(FALLBACK_URL);
} else {
  fetch(JSON_URL).then(r=>r.json()).then(data=>{
    const entry = data[exe];
    window.location.replace(entry&&entry.lootlabs?entry.lootlabs:FALLBACK_URL);
  }).catch(()=>window.location.replace(FALLBACK_URL));
}
</script>
</head>
<body></body>
</html>
